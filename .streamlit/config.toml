[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
maxUploadSize = 200
showSidebarNavigation = false

[runner]
fastReruns = true
magicEnabled = false  # 禁用魔法命令，提升性能

[server]
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true
